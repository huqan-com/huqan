name: Benchmark Regression

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run benchmark
        run: node benchmarks/bench.js --json --quick > benchmarks/current-results.json

      - name: Check regression
        run: node benchmarks/check-regression.js benchmarks/results.json benchmarks/current-results.json --multiplier=1.75

      - name: Publish benchmark summary
        if: always()
        run: |
          echo "## Benchmark Summary" >> $GITHUB_STEP_SUMMARY
          node benchmarks/check-regression.js benchmarks/results.json benchmarks/current-results.json --multiplier=1.75 >> $GITHUB_STEP_SUMMARY
